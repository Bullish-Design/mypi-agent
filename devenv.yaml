# devenv.yaml
# yaml-language-server: $schema=https://devenv.sh/devenv.schema.json

require_version: ">=2.1"

inputs:
  nixpkgs:
    url: github:cachix/devenv-nixpkgs/rolling
  nixpkgs-python:
    url: github:cachix/nixpkgs-python
    follows: nixpkgs
  allium-env:
    url: github:Bullish-Design/allium-env?ref=v0.1.0
    flake: false

imports:
  - allium-env
  - ./dev/allium
  - ./dev
